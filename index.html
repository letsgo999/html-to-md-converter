<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML → Markdown 변환기</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #f8f9fa; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f3f5; }
    ::-webkit-scrollbar-thumb { background: #ced4da; border-radius: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback } = React;

    // ============================================================
    // 유틸리티
    // ============================================================
    const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

    function formatFileSize(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsText(file, "UTF-8");
      });
    }

    // ============================================================
    // DOM → Markdown 변환 함수
    // ============================================================
    function processInline(node) {
      return Array.from(node.childNodes)
        .map((child) => {
          if (child.nodeType === 3) return child.textContent.replace(/[ \t]+/g, " ");
          if (child.nodeType !== 1) return "";
          const tag = child.tagName.toLowerCase();
          switch (tag) {
            case "strong": case "b": return `**${processInline(child)}**`;
            case "em":     case "i": return `*${processInline(child)}*`;
            case "code":  return `\`${child.textContent}\``;
            case "a":     return processInline(child);
            case "img":   return child.getAttribute("alt") || "";
            case "br":    return "  \n";
            default:      return processInline(child);
          }
        })
        .join("");
    }

    function processListItems(listNode, type, depth = 0) {
      const indent = "  ".repeat(depth);
      const lines = [];
      let orderedIndex = 1;
      Array.from(listNode.childNodes).forEach((li) => {
        if (li.nodeType !== 1 || li.tagName.toLowerCase() !== "li") return;
        let lineText = "";
        const nestedLists = [];
        Array.from(li.childNodes).forEach((child) => {
          if (child.nodeType === 3) {
            lineText += child.textContent.replace(/[ \t]+/g, " ");
          } else if (child.nodeType === 1) {
            const ctag = child.tagName.toLowerCase();
            if (ctag === "ul") nestedLists.push({ type: "ul", node: child });
            else if (ctag === "ol") nestedLists.push({ type: "ol", node: child });
            else lineText += processInline(child);
          }
        });
        const marker = type === "ul" ? "-" : `${orderedIndex}.`;
        if (type === "ol") orderedIndex++;
        lines.push(`${indent}${marker} ${lineText.trim()}`);
        nestedLists.forEach(({ type: ntype, node }) => {
          lines.push(processListItems(node, ntype, depth + 1));
        });
      });
      return lines.join("\n");
    }

    function convertTable(tableNode) {
      const allRows = Array.from(tableNode.querySelectorAll("tr"));
      if (allRows.length === 0) return "";
      const tableData = allRows.map((row) =>
        Array.from(row.querySelectorAll("th, td")).map((cell) =>
          cell.textContent.replace(/\|/g, "\\|").replace(/\s+/g, " ").trim()
        )
      );
      const maxCols = Math.max(...tableData.map((r) => r.length));
      const pad = (row) => { while (row.length < maxCols) row.push(""); return row; };
      const headers = pad(tableData[0]);
      const separator = headers.map(() => "---");
      const body = tableData.slice(1).map(pad);
      let result = `| ${headers.join(" | ")} |\n| ${separator.join(" | ")} |\n`;
      body.forEach((row) => { result += `| ${row.join(" | ")} |\n`; });
      return result;
    }

    const SKIP_TAGS = new Set([
      "script", "style", "head", "meta", "link", "noscript",
      "iframe", "svg", "input", "select", "textarea", "canvas",
      "button", "form",
    ]);

    function processBlock(node) {
      if (node.nodeType === 3) {
        const t = node.textContent.replace(/[ \t]+/g, " ").trim();
        return t ? t + " " : "";
      }
      if (node.nodeType !== 1) return "";
      const tag = node.tagName.toLowerCase();
      if (SKIP_TAGS.has(tag)) return "";
      switch (tag) {
        case "h1": return `# ${processInline(node).trim()}\n\n`;
        case "h2": return `## ${processInline(node).trim()}\n\n`;
        case "h3": return `### ${processInline(node).trim()}\n\n`;
        case "h4": return `#### ${processInline(node).trim()}\n\n`;
        case "h5": return `##### ${processInline(node).trim()}\n\n`;
        case "h6": return `###### ${processInline(node).trim()}\n\n`;
        case "p": {
          const c = processInline(node).trim();
          return c ? `${c}\n\n` : "";
        }
        case "br": return "\n";
        case "hr": return "---\n\n";
        case "ul": return processListItems(node, "ul") + "\n\n";
        case "ol": return processListItems(node, "ol") + "\n\n";
        case "pre": {
          const codeEl = node.querySelector("code");
          const content = codeEl ? codeEl.textContent : node.textContent;
          const lang = (codeEl?.className || "").match(/language-(\w+)/)?.[1] || "";
          return `\`\`\`${lang}\n${content.replace(/\n$/, "")}\n\`\`\`\n\n`;
        }
        case "code": return `\`${node.textContent}\``;
        case "blockquote": {
          const inner = processChildren(node).trim();
          return inner.split("\n").map((l) => `> ${l}`).join("\n") + "\n\n";
        }
        case "table": return convertTable(node) + "\n";
        case "strong": case "b": return `**${processInline(node)}**`;
        case "em":     case "i": return `*${processInline(node)}*`;
        case "a":  return processInline(node);
        case "img": return node.getAttribute("alt") || "";
        default:   return processChildren(node);
      }
    }

    function processChildren(node) {
      return Array.from(node.childNodes)
        .map((child) => processBlock(child))
        .join("");
    }

    // ============================================================
    // iframe 렌더링 (JS 실행 포함)
    // ============================================================
    function renderInIframe(html) {
      return new Promise((resolve) => {
        const iframe = document.createElement("iframe");
        iframe.setAttribute("sandbox", "allow-scripts allow-same-origin");
        iframe.style.cssText =
          "position:fixed;top:-9999px;left:-9999px;width:1400px;height:900px;" +
          "border:none;visibility:hidden;pointer-events:none;z-index:-1;";
        let done = false;
        const finish = () => {
          if (done) return;
          done = true;
          setTimeout(() => resolve(iframe), 900);
        };
        iframe.onload = finish;
        setTimeout(finish, 6000);
        document.body.appendChild(iframe);
        iframe.srcdoc = html;
      });
    }

    // ============================================================
    // 동적 네비게이션 패턴 탐지
    // ============================================================
    async function findDynamicPattern(doc) {
      const containers = Array.from(
        doc.querySelectorAll("ul, ol, nav, [role='tablist']")
      ).filter((el) => {
        const items = el.querySelectorAll(
          ":scope > li, :scope > button, :scope > [role='tab']"
        );
        return items.length >= 2;
      });

      if (containers.length === 0) return { navContainer: null, contentArea: null };

      const candidates = Array.from(doc.querySelectorAll("[id]")).filter(
        (el) => !["html", "head", "body"].includes(el.tagName.toLowerCase())
      );

      for (const container of containers) {
        const items = Array.from(
          container.querySelectorAll(":scope > li, :scope > button, :scope > [role='tab']")
        );
        if (items.length < 2) continue;

        const before = {};
        candidates.forEach((el) => { before[el.id] = el.innerHTML; });

        items[0].click();
        await delay(350);

        let bestEl = null;
        let bestChange = 0;
        candidates.forEach((el) => {
          if (!el.id || before[el.id] === el.innerHTML) return;
          const change = Math.abs(el.innerHTML.length - (before[el.id] || "").length);
          const notRelated = !el.contains(container) && !container.contains(el) && el !== container;
          if (change > bestChange && notRelated) {
            bestChange = change;
            bestEl = el;
          }
        });

        if (bestEl && bestChange > 30) {
          return { navContainer: container, contentArea: bestEl };
        }
      }

      return { navContainer: null, contentArea: null };
    }

    // ============================================================
    // 메인 변환 함수 (비동기)
    // ============================================================
    async function convertHtmlToMarkdown(html, onProgress) {
      onProgress({ status: "HTML 렌더링 중 (JS 실행 포함)...", current: 0, total: 0 });

      const iframe = await renderInIframe(html);

      try {
        const doc = iframe.contentDocument || iframe.contentWindow?.document;

        if (!doc || !doc.body) {
          onProgress({ status: "정적 변환 중 (폴백)...", current: 0, total: 0 });
          const parser = new DOMParser();
          const staticDoc = parser.parseFromString(html, "text/html");
          return processChildren(staticDoc.body).replace(/\n{3,}/g, "\n\n").trim();
        }

        const title = doc.title || "";
        let output = title ? `# ${title}\n\n` : "";

        onProgress({ status: "동적 콘텐츠 구조 분석 중...", current: 0, total: 0 });
        const { navContainer, contentArea } = await findDynamicPattern(doc);

        if (navContainer && contentArea) {
          onProgress({ status: "정적 본문 추출 중...", current: 0, total: 0 });
          const bodyClone = doc.body.cloneNode(true);

          [
            { id: navContainer.id },
            { id: contentArea.id },
          ].forEach(({ id }) => {
            if (!id) return;
            const cloneEl = bodyClone.querySelector(`#${id}`);
            if (!cloneEl) return;
            const parent = cloneEl.parentElement;
            if (
              parent && parent !== bodyClone &&
              parent.tagName.toLowerCase() === "div" &&
              parent.children.length === 1 && !parent.id
            ) {
              parent.remove();
            } else {
              cloneEl.remove();
            }
          });

          const staticMd = processChildren(bodyClone).replace(/\n{3,}/g, "\n\n").trim();
          if (staticMd) output += staticMd + "\n\n";

          const itemCount = navContainer.querySelectorAll(
            ":scope > li, :scope > button, :scope > [role='tab']"
          ).length;

          output += `---\n\n`;

          for (let i = 0; i < itemCount; i++) {
            onProgress({
              status: `항목 ${i + 1}/${itemCount} 추출 중...`,
              current: i + 1,
              total: itemCount,
            });

            const freshItems = Array.from(
              navContainer.querySelectorAll(
                ":scope > li, :scope > button, :scope > [role='tab']"
              )
            );
            const item = freshItems[i];
            if (!item) continue;

            const itemLabel = item.textContent.replace(/\s+/g, " ").trim();
            item.click();
            await delay(300);

            const sectionMd = processChildren(contentArea)
              .replace(/\n{3,}/g, "\n\n")
              .trim();

            if (sectionMd) {
              output += `## ${itemLabel}\n\n${sectionMd}\n\n---\n\n`;
            }
          }
        } else {
          onProgress({ status: "본문 전체 추출 중...", current: 0, total: 0 });
          const bodyMd = processChildren(doc.body).replace(/\n{3,}/g, "\n\n").trim();
          if (bodyMd) output += bodyMd;
        }

        return output.replace(/\n{3,}/g, "\n\n").trim();
      } finally {
        if (iframe && iframe.parentNode) iframe.parentNode.removeChild(iframe);
      }
    }

    // ============================================================
    // React 앱
    // ============================================================
    function App() {
      const [file, setFile] = useState(null);
      const [markdown, setMarkdown] = useState("");
      const [error, setError] = useState("");
      const [isDragging, setIsDragging] = useState(false);
      const [showModal, setShowModal] = useState(false);
      const [downloadFilename, setDownloadFilename] = useState("");
      const [isConverting, setIsConverting] = useState(false);
      const [convProgress, setConvProgress] = useState({ status: "", current: 0, total: 0 });
      const fileInputRef = useRef(null);
      const MAX_SIZE = 10 * 1024 * 1024;

      const processFile = useCallback(async (f) => {
        if (!f) return;
        if (!f.name.match(/\.html?$/i)) {
          setError("⚠️ HTML 파일(.html, .htm)만 업로드 가능합니다.");
          return;
        }
        if (f.size > MAX_SIZE) {
          setError("⚠️ 파일 크기는 10MB 이하여야 합니다.");
          return;
        }
        setError("");
        setIsConverting(true);
        setConvProgress({ status: "파일 읽는 중...", current: 0, total: 0 });
        try {
          const html = await readFileAsText(f);
          const md = await convertHtmlToMarkdown(html, setConvProgress);
          setMarkdown(md);
          setFile(f);
          setDownloadFilename(f.name.replace(/\.html?$/i, ".md"));
        } catch (err) {
          setError("⚠️ 변환 중 오류가 발생했습니다: " + err.message);
        } finally {
          setIsConverting(false);
          setConvProgress({ status: "", current: 0, total: 0 });
        }
      }, []);

      const handleDrop = useCallback((e) => {
        e.preventDefault();
        setIsDragging(false);
        const f = e.dataTransfer.files[0];
        if (f) processFile(f);
      }, [processFile]);

      const handleReset = () => {
        setFile(null); setMarkdown(""); setError(""); setShowModal(false);
      };

      const handleDownload = () => {
        if (!markdown) return;
        let name = downloadFilename.trim() || "converted.md";
        if (!name.endsWith(".md")) name += ".md";
        const blob = new Blob([markdown], { type: "text/markdown;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = name;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a); URL.revokeObjectURL(url);
        setShowModal(false);
      };

      const lineCount = markdown ? markdown.split("\n").length : 0;
      const charCount = markdown ? markdown.length : 0;
      const progressPct = convProgress.total > 0
        ? Math.round((convProgress.current / convProgress.total) * 100)
        : null;

      const fontStyle = {
        fontFamily: "'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif",
      };

      return (
        <div style={{ minHeight: "100vh", background: "#f8f9fa", color: "#1a1a2e", ...fontStyle }}>

          {/* 헤더 */}
          <header style={{
            background: "#fff", borderBottom: "1px solid #e9ecef",
            padding: "0 24px", height: 60,
            display: "flex", alignItems: "center", justifyContent: "space-between",
            boxShadow: "0 1px 3px rgba(0,0,0,0.06)", position: "sticky", top: 0, zIndex: 100,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{
                width: 32, height: 32,
                background: "linear-gradient(135deg, #6c63ff, #4ecdc4)",
                borderRadius: 8, display: "flex", alignItems: "center",
                justifyContent: "center", fontSize: 16,
              }}>📄</div>
              <span style={{ fontWeight: 700, fontSize: 17, letterSpacing: "-0.3px" }}>
                HTML → Markdown 변환기
              </span>
              <span style={{
                fontSize: 11, background: "#e8f5e9", color: "#2e7d32",
                borderRadius: 4, padding: "2px 7px", fontWeight: 600,
              }}>동적 콘텐츠 지원</span>
            </div>
            {file && (
              <button onClick={handleReset} style={{
                background: "none", border: "1px solid #dee2e6", borderRadius: 6,
                padding: "6px 14px", fontSize: 13, color: "#6c757d", cursor: "pointer",
              }}>새 파일 변환</button>
            )}
          </header>

          {/* 메인 */}
          <main style={{ maxWidth: 1100, margin: "0 auto", padding: "32px 20px" }}>
            {!file ? (
              <div style={{ maxWidth: 580, margin: "60px auto 0" }}>
                <p style={{
                  textAlign: "center", fontSize: 14, color: "#868e96",
                  marginBottom: 28, lineHeight: 1.8,
                }}>
                  HTML 파일을 업로드하면 마크다운(.md) 파일로 변환합니다.<br />
                  <strong style={{ color: "#6c63ff" }}>버튼·사이드바 클릭으로 나타나는 동적 콘텐츠</strong>도 빠짐없이 추출합니다.
                </p>

                {/* 드래그 앤 드롭 */}
                <div
                  onDrop={handleDrop}
                  onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
                  onDragLeave={() => setIsDragging(false)}
                  onClick={() => fileInputRef.current?.click()}
                  style={{
                    border: `2px dashed ${isDragging ? "#6c63ff" : "#ced4da"}`,
                    borderRadius: 16, padding: "56px 32px", textAlign: "center",
                    cursor: "pointer",
                    background: isDragging ? "rgba(108,99,255,0.05)" : "#fff",
                    transition: "all 0.2s ease",
                  }}
                >
                  <div style={{ fontSize: 48, marginBottom: 16 }}>📂</div>
                  <p style={{
                    fontSize: 16, fontWeight: 600,
                    color: isDragging ? "#6c63ff" : "#343a40", marginBottom: 8,
                  }}>
                    {isDragging ? "여기에 놓아주세요!" : "파일을 여기에 끌어다 놓거나"}
                  </p>
                  <p style={{ fontSize: 14, color: "#868e96", marginBottom: 20 }}>
                    클릭해서 파일을 선택하세요
                  </p>
                  <span style={{
                    display: "inline-block",
                    background: "linear-gradient(135deg, #6c63ff, #4ecdc4)",
                    color: "#fff", borderRadius: 8, padding: "10px 24px",
                    fontSize: 14, fontWeight: 600,
                  }}>파일 선택</span>
                  <p style={{ fontSize: 12, color: "#adb5bd", marginTop: 16 }}>
                    .html, .htm 파일 · 최대 10MB
                  </p>
                </div>

                <input ref={fileInputRef} type="file" accept=".html,.htm"
                  style={{ display: "none" }}
                  onChange={(e) => { const f = e.target.files[0]; if (f) processFile(f); e.target.value = ""; }}
                />

                {/* 기능 안내 카드 */}
                <div style={{
                  marginTop: 24, display: "grid",
                  gridTemplateColumns: "1fr 1fr", gap: 10,
                }}>
                  {[
                    ["🏷️", "정적 HTML 구조", "제목·단락·목록·표·코드블록"],
                    ["⚡", "동적 JS 콘텐츠", "사이드바·탭·버튼 클릭 콘텐츠"],
                    ["🔗", "링크 처리", "링크 제거, 텍스트 유지"],
                    ["🖼️", "이미지 처리", "alt 텍스트만 추출"],
                  ].map(([icon, title, desc]) => (
                    <div key={title} style={{
                      background: "#fff", border: "1px solid #e9ecef",
                      borderRadius: 10, padding: "12px 14px",
                    }}>
                      <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 2 }}>
                        {icon} {title}
                      </div>
                      <div style={{ fontSize: 12, color: "#868e96" }}>{desc}</div>
                    </div>
                  ))}
                </div>

                {error && (
                  <div style={{
                    marginTop: 16, padding: "12px 16px",
                    background: "#fff5f5", border: "1px solid #ffc9c9",
                    borderRadius: 8, fontSize: 13, color: "#e03131",
                  }}>{error}</div>
                )}
              </div>
            ) : (
              <div>
                {/* 파일 정보 바 */}
                <div style={{
                  background: "#fff", border: "1px solid #e9ecef", borderRadius: 10,
                  padding: "14px 20px", display: "flex", alignItems: "center",
                  justifyContent: "space-between", marginBottom: 20,
                  flexWrap: "wrap", gap: 12,
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <span style={{ fontSize: 22 }}>✅</span>
                    <div>
                      <p style={{ fontWeight: 600, fontSize: 14, margin: 0, color: "#212529" }}>
                        {file.name} → {downloadFilename}
                      </p>
                      <p style={{ fontSize: 12, color: "#868e96", margin: "2px 0 0" }}>
                        원본 {formatFileSize(file.size)} · 변환 결과 {lineCount.toLocaleString()}줄 · {charCount.toLocaleString()}자
                      </p>
                    </div>
                  </div>
                  <button onClick={() => setShowModal(true)} style={{
                    background: "linear-gradient(135deg, #6c63ff, #4ecdc4)",
                    color: "#fff", border: "none", borderRadius: 8,
                    padding: "10px 22px", fontSize: 14, fontWeight: 600, cursor: "pointer",
                  }}>⬇ 마크다운 다운로드</button>
                </div>

                {/* 미리보기 */}
                <div style={{
                  background: "#fff", border: "1px solid #e9ecef",
                  borderRadius: 10, overflow: "hidden",
                }}>
                  <div style={{
                    padding: "10px 16px", borderBottom: "1px solid #f1f3f5",
                    display: "flex", alignItems: "center", gap: 8, background: "#f8f9fa",
                  }}>
                    <span style={{ fontSize: 13, color: "#495057", fontWeight: 600 }}>📝 미리보기</span>
                    <span style={{
                      fontSize: 11, color: "#adb5bd", background: "#e9ecef",
                      borderRadius: 4, padding: "2px 7px",
                    }}>.md</span>
                  </div>
                  <div style={{ overflowY: "auto", maxHeight: "65vh", padding: "24px" }}>
                    <pre style={{
                      margin: 0,
                      fontFamily: "'JetBrains Mono', 'Fira Code', 'Consolas', monospace",
                      fontSize: 13, lineHeight: 1.75, color: "#212529",
                      whiteSpace: "pre-wrap", wordBreak: "break-word",
                    }}>{markdown}</pre>
                  </div>
                </div>
              </div>
            )}

            {/* 변환 중 오버레이 */}
            {isConverting && (
              <div style={{
                position: "fixed", inset: 0, background: "rgba(255,255,255,0.92)",
                display: "flex", flexDirection: "column",
                alignItems: "center", justifyContent: "center", zIndex: 200,
              }}>
                <div style={{
                  width: 56, height: 56,
                  border: "5px solid #e9ecef", borderTop: "5px solid #6c63ff",
                  borderRadius: "50%", animation: "spin 0.8s linear infinite",
                  marginBottom: 20,
                }} />
                <p style={{ fontSize: 15, fontWeight: 600, color: "#343a40", marginBottom: 8 }}>
                  {convProgress.status || "처리 중..."}
                </p>
                {convProgress.total > 0 && (
                  <div style={{ width: 300 }}>
                    <div style={{
                      background: "#e9ecef", borderRadius: 999,
                      height: 8, overflow: "hidden", marginBottom: 6,
                    }}>
                      <div style={{
                        width: `${progressPct}%`, height: "100%",
                        background: "linear-gradient(90deg, #6c63ff, #4ecdc4)",
                        borderRadius: 999, transition: "width 0.3s ease",
                      }} />
                    </div>
                    <p style={{ fontSize: 12, color: "#868e96", textAlign: "center" }}>
                      {convProgress.current}/{convProgress.total} 항목 처리 중 ({progressPct}%)
                    </p>
                  </div>
                )}
                <p style={{
                  marginTop: 16, fontSize: 12, color: "#adb5bd",
                  maxWidth: 320, textAlign: "center",
                }}>
                  동적 콘텐츠를 모두 추출하기 위해 HTML을 렌더링하고<br />
                  각 메뉴 항목을 순차적으로 클릭하고 있습니다.
                </p>
              </div>
            )}
          </main>

          {/* 다운로드 모달 */}
          {showModal && (
            <div style={{
              position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)",
              display: "flex", alignItems: "center", justifyContent: "center",
              zIndex: 300, padding: 20,
            }} onClick={(e) => { if (e.target === e.currentTarget) setShowModal(false); }}>
              <div style={{
                background: "#fff", borderRadius: 14, padding: 32,
                width: "100%", maxWidth: 440,
                boxShadow: "0 20px 60px rgba(0,0,0,0.2)",
              }}>
                <h2 style={{ margin: "0 0 8px", fontSize: 18, fontWeight: 700 }}>
                  마크다운 파일 다운로드
                </h2>
                <p style={{ fontSize: 13, color: "#868e96", marginBottom: 24 }}>
                  저장할 파일명을 수정할 수 있습니다.
                </p>
                <label style={{
                  display: "block", fontSize: 13, fontWeight: 600,
                  color: "#495057", marginBottom: 8,
                }}>파일명</label>
                <input
                  type="text"
                  value={downloadFilename}
                  onChange={(e) => setDownloadFilename(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter") handleDownload();
                    if (e.key === "Escape") setShowModal(false);
                  }}
                  style={{
                    width: "100%", border: "1px solid #ced4da", borderRadius: 8,
                    padding: "10px 14px", fontSize: 14, color: "#212529",
                    outline: "none", boxSizing: "border-box",
                    fontFamily: "inherit", marginBottom: 24,
                  }}
                  autoFocus
                />
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => setShowModal(false)} style={{
                    flex: 1, padding: "11px", border: "1px solid #dee2e6",
                    borderRadius: 8, background: "#fff", fontSize: 14,
                    color: "#495057", cursor: "pointer", fontWeight: 500,
                  }}>취소</button>
                  <button onClick={handleDownload} style={{
                    flex: 2, padding: "11px", border: "none", borderRadius: 8,
                    background: "linear-gradient(135deg, #6c63ff, #4ecdc4)",
                    color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer",
                  }}>⬇ 다운로드</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 앱 마운트
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
